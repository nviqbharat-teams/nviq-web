<header class="header" [class.scrolled]="scrolled()">
  <div class="header-inner">
    <!-- Logo -->
    <a routerLink="/" class="logo" (click)="closeMobile()">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="#38bdf8"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-dot"></span>
      </div>
      <span class="logo-text">NV<span class="logo-accent">i</span>Q</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      <a href="javascript:void(0)" (click)="scrollToSection('fleet-solutions')">Fleet Solutions</a>
      <a href="javascript:void(0)" (click)="scrollToSection('mutual-funds')" class="nav-highlight">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        Mutual Funds
      </a>
      <a routerLink="/pricing" routerLinkActive="active">Pricing</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>

    <!-- CTA -->
    <div class="header-actions">
      <button type="button" class="btn-ghost-sm" (click)="openModal()">Get Demo</button>
      <button type="button" class="btn-primary-sm" (click)="openModal()">Start Free</button>
    </div>

    <!-- Mobile Hamburger -->
    <button class="hamburger" (click)="toggleMobile()" [class.open]="mobileOpen()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="mobileOpen()">
    <a routerLink="/" (click)="closeMobile()">Home</a>
    <a href="javascript:void(0)" (click)="scrollToSection('fleet-solutions'); closeMobile()">Fleet Solutions</a>
    <a href="javascript:void(0)" (click)="scrollToSection('mutual-funds'); closeMobile()" class="nav-highlight-mobile">
      ✦ Mutual Funds
    </a>
    <a routerLink="/pricing" (click)="closeMobile()">Pricing</a>
    <a routerLink="/contact" (click)="closeMobile()">Contact</a>
    <div class="mobile-cta">
      <button type="button" class="btn-primary" (click)="openModal(); closeMobile()">Start Free Trial</button>
    </div>
  </div>
</header>
