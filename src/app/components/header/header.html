<header class="header" [class.scrolled]="scrolled()">
  <div class="header-inner">
    <!-- Logo -->
    <a routerLink="/" class="logo" (click)="closeMobile()">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="#38bdf8"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-dot"></span>
      </div>
      <span class="logo-text">NV<span class="logo-accent">i</span>Q</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <a routerLink="/about" routerLinkActive="active">About</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>

    <!-- CTA -->
    <div class="header-actions">
      <a routerLink="/contact" class="btn-ghost-sm">Get Demo</a>
      <a routerLink="/contact" class="btn-primary-sm">Start Free</a>
    </div>

    <!-- Mobile Hamburger -->
    <button class="hamburger" (click)="toggleMobile()" [class.open]="mobileOpen()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="mobileOpen()">
    <a routerLink="/" (click)="closeMobile()">Home</a>
    <a routerLink="/services" (click)="closeMobile()">Services</a>
    <a routerLink="/about" (click)="closeMobile()">About</a>
    <a routerLink="/contact" (click)="closeMobile()">Contact</a>
    <div class="mobile-cta">
      <a routerLink="/contact" class="btn-primary" (click)="closeMobile()">Start Free Trial</a>
    </div>
  </div>
</header>
